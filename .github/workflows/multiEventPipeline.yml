name: Multi Event Pipeline / Workflow

on:
  push:
    branches:
      - main
      - test

  schedule:
  - cron: '10 11 * * *'

  pull_request:
    branches:
      - main
      - test
    types:
      - closed
      - opened

  workflow_dispatch:

jobs:
  on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Running on main/test push
        run: echo "Running on main/test push"

  on-pull-request:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Running on pull request
        run: echo "Running on pull request check"

  on-pull-request-closed:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Running on pull request close
        run: echo "Running on pull request closed"

  on-pull-request-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Running on pull request open
        run: echo "Running on pull request opened"


  on-workflow-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Running on workflow dispatch request
        run: echo "Running on workflow dispatch"

  on-schedule:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Running scheduled workflow
        run: echo "Workflow triggered by schedule event"
